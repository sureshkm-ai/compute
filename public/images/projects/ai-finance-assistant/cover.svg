<svg viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="1200" height="675" fill="#080c10"/>

  <!-- Subtle background grid -->
  <g stroke="#0f1a14" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="200" y1="0" x2="200" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="800" y1="0" x2="800" y2="675"/>
    <line x1="1000" y1="0" x2="1000" y2="675"/>
  </g>

  <!-- Background glow on right side -->
  <radialGradient id="centerGlow" cx="72%" cy="50%" r="30%">
    <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="675" fill="url(#centerGlow)"/>

  <!-- Faint candlestick chart in background (left side decoration) -->
  <g opacity="0.07" stroke="#10b981" stroke-width="2" fill="none">
    <line x1="80" y1="450" x2="80" y2="350"/>
    <rect x="72" y="380" width="16" height="50" fill="#10b981"/>
    <line x1="120" y1="420" x2="120" y2="310"/>
    <rect x="112" y="330" width="16" height="60" fill="#10b981"/>
    <line x1="160" y1="400" x2="160" y2="290"/>
    <rect x="152" y="300" width="16" height="70" fill="#10b981"/>
    <line x1="200" y1="360" x2="200" y2="260"/>
    <rect x="192" y="270" width="16" height="60" fill="#ef4444"/>
    <line x1="240" y1="380" x2="240" y2="280"/>
    <rect x="232" y="295" width="16" height="55" fill="#10b981"/>
    <line x1="280" y1="340" x2="280" y2="240"/>
    <rect x="272" y="250" width="16" height="60" fill="#10b981"/>
    <line x1="320" y1="310" x2="320" y2="210"/>
    <rect x="312" y="220" width="16" height="65" fill="#10b981"/>
    <line x1="360" y1="350" x2="360" y2="250"/>
    <rect x="352" y="265" width="16" height="55" fill="#ef4444"/>
    <line x1="400" y1="320" x2="400" y2="210"/>
    <rect x="392" y="220" width="16" height="70" fill="#10b981"/>
    <line x1="440" y1="290" x2="440" y2="195"/>
    <rect x="432" y="205" width="16" height="60" fill="#10b981"/>
    <line x1="480" y1="270" x2="480" y2="175"/>
    <rect x="472" y="185" width="16" height="55" fill="#10b981"/>
  </g>

  <!-- Vertical divider -->
  <line x1="540" y1="60" x2="540" y2="615" stroke="#1a2a1e" stroke-width="1"/>

  <!-- ═══════════════ LEFT SIDE: Branding ═══════════════ -->

  <!-- Live badge -->
  <rect x="60" y="120" width="58" height="26" rx="13" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="80" cy="133" r="4" fill="#10b981"/>
  <text x="90" y="138" font-size="12" fill="#10b981" font-weight="600" letter-spacing="0.5">Live</text>

  <!-- Finnie wordmark -->
  <text x="60" y="230" font-size="88" font-weight="700" fill="#ffffff" letter-spacing="-3">Finnie</text>

  <!-- Subtitle -->
  <text x="62" y="278" font-size="22" fill="#94a3b8" font-weight="400" letter-spacing="0.3">AI Finance Assistant</text>

  <!-- Thin accent line -->
  <rect x="62" y="300" width="200" height="2" rx="1" fill="#10b981" opacity="0.6"/>

  <!-- Description lines -->
  <text x="62" y="340" font-size="15" fill="#64748b">Multi-agent system with 6 specialist agents</text>
  <text x="62" y="362" font-size="15" fill="#64748b">for financial education, analysis &amp; planning.</text>

  <!-- Agent count stat -->
  <g>
    <text x="62" y="420" font-size="36" font-weight="700" fill="#10b981">6</text>
    <text x="98" y="412" font-size="12" fill="#64748b">Specialist</text>
    <text x="98" y="428" font-size="12" fill="#64748b">Agents</text>
  </g>
  <g>
    <text x="175" y="420" font-size="36" font-weight="700" fill="#10b981">50+</text>
    <text x="228" y="412" font-size="12" fill="#64748b">Finance</text>
    <text x="228" y="428" font-size="12" fill="#64748b">Articles (RAG)</text>
  </g>
  <g>
    <text x="360" y="420" font-size="36" font-weight="700" fill="#10b981">7</text>
    <text x="390" y="412" font-size="12" fill="#64748b">MCP</text>
    <text x="390" y="428" font-size="12" fill="#64748b">Tools</text>
  </g>

  <!-- Stack tags -->
  <g font-size="12" font-weight="500">
    <!-- Python -->
    <rect x="62" y="460" width="62" height="24" rx="12" fill="#1e293b"/>
    <text x="93" y="476" text-anchor="middle" fill="#94a3b8">Python</text>
    <!-- LangGraph -->
    <rect x="132" y="460" width="80" height="24" rx="12" fill="#1e293b"/>
    <text x="172" y="476" text-anchor="middle" fill="#94a3b8">LangGraph</text>
    <!-- Gemini -->
    <rect x="220" y="460" width="130" height="24" rx="12" fill="#1e293b"/>
    <text x="285" y="476" text-anchor="middle" fill="#94a3b8">Gemini 2.0 Flash</text>
    <!-- FAISS -->
    <rect x="62" y="492" width="52" height="24" rx="12" fill="#1e293b"/>
    <text x="88" y="508" text-anchor="middle" fill="#94a3b8">FAISS</text>
    <!-- Streamlit -->
    <rect x="122" y="492" width="72" height="24" rx="12" fill="#1e293b"/>
    <text x="158" y="508" text-anchor="middle" fill="#94a3b8">Streamlit</text>
    <!-- MCP -->
    <rect x="202" y="492" width="44" height="24" rx="12" fill="#1e293b"/>
    <text x="224" y="508" text-anchor="middle" fill="#94a3b8">MCP</text>
  </g>

  <!-- ═══════════════ RIGHT SIDE: Agent Network ═══════════════ -->

  <!-- Define arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#10b981" opacity="0.5"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Agent node positions (hex around center):
       Center: (870, 337)
       Radius: 155
       Angles: 90°(top), 30°(top-right), -30°(bottom-right), -90°(bottom), -150°(bottom-left), 150°(top-left)
  -->
  <!-- Connections from center to each agent -->
  <!-- Top (Q&A): 870, 182 -->
  <line x1="870" y1="315" x2="870" y2="218" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.45" marker-end="url(#arrowhead)"/>
  <!-- Top-right (Portfolio): 870+134=1004, 337-77=260 -->
  <line x1="889" y1="320" x2="982" y2="270" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.45" marker-end="url(#arrowhead)"/>
  <!-- Bottom-right (Market): 1004, 337+77=414 -->
  <line x1="889" y1="354" x2="982" y2="404" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.45" marker-end="url(#arrowhead)"/>
  <!-- Bottom (Goal Planning): 870, 492 -->
  <line x1="870" y1="359" x2="870" y2="456" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.45" marker-end="url(#arrowhead)"/>
  <!-- Bottom-left (News): 870-134=736, 414 -->
  <line x1="851" y1="354" x2="758" y2="404" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.45" marker-end="url(#arrowhead)"/>
  <!-- Top-left (Tax): 736, 260 -->
  <line x1="851" y1="320" x2="758" y2="270" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.45" marker-end="url(#arrowhead)"/>

  <!-- ── Agent Nodes ── -->

  <!-- Top: Finance Q&A (870, 182) -->
  <rect x="808" y="152" width="124" height="60" rx="14" fill="#0d1f17" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <text x="870" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Finance Q&amp;A</text>
  <text x="870" y="196" text-anchor="middle" font-size="10" fill="#64748b">RAG · 50+ articles</text>

  <!-- Top-right: Portfolio (1004, 260) -->
  <rect x="942" y="230" width="124" height="60" rx="14" fill="#0d1f17" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <text x="1004" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Portfolio</text>
  <text x="1004" y="274" text-anchor="middle" font-size="10" fill="#64748b">Analysis · Scoring</text>

  <!-- Bottom-right: Market (1004, 414) -->
  <rect x="942" y="384" width="124" height="60" rx="14" fill="#0d1f17" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <text x="1004" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Market</text>
  <text x="1004" y="428" text-anchor="middle" font-size="10" fill="#64748b">Live prices · yFinance</text>

  <!-- Bottom: Goal Planning (870, 492) -->
  <rect x="808" y="462" width="124" height="60" rx="14" fill="#0d1f17" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <text x="870" y="488" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Goal Planning</text>
  <text x="870" y="506" text-anchor="middle" font-size="10" fill="#64748b">Projections · Scenarios</text>

  <!-- Bottom-left: News (736, 414) -->
  <rect x="674" y="384" width="124" height="60" rx="14" fill="#0d1f17" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <text x="736" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">News</text>
  <text x="736" y="428" text-anchor="middle" font-size="10" fill="#64748b">Synthesis · Headlines</text>

  <!-- Top-left: Tax (736, 260) -->
  <rect x="674" y="230" width="124" height="60" rx="14" fill="#0d1f17" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
  <text x="736" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Tax Education</text>
  <text x="736" y="274" text-anchor="middle" font-size="10" fill="#64748b">IRS rules · Limits</text>

  <!-- ── Central Router Node (Finnie) ── -->
  <circle cx="870" cy="337" r="48" fill="#052e16" stroke="#10b981" stroke-width="2.5" filter="url(#glow)"/>
  <text x="870" y="331" text-anchor="middle" font-size="16" font-weight="700" fill="#10b981">Finnie</text>
  <text x="870" y="349" text-anchor="middle" font-size="10" fill="#6ee7b7">Router</text>

  <!-- Powered by label -->
  <text x="870" y="600" text-anchor="middle" font-size="12" fill="#1e3a2a">Powered by LangGraph · Gemini 2.0 Flash</text>
</svg>
